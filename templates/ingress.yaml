apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "free-batch.fullname" . }}-frontend-ingress
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className }}
spec:
  rules:
  {{- range .Values.ingress.hosts }}
  - host: {{ .host }}
    http:
      paths:
      {{- range .paths }}
      - path: {{ .path }}
        pathType: {{ .pathType }}
      {{- end }}
    {{- end }}
        backend:
          service:
            name: {{ include "free-batch.fullname" . }}-frontend
            port:
              number: {{ .Values.frontend.service.port }}
