apiVersion: v1
kind: Secret
metadata:
  name: {{ include "free-batch.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "free-batch.labels" . | nindent 4 }}
type: Opaque
data:
  DB_PASSWORD: {{ .Values.secret.dbPassword | b64enc }}
  RABBITMQ_USER: {{ .Values.rabbitmq.auth.user | b64enc }}
  RABBITMQ_PASSWORD: {{ .Values.rabbitmq.auth.password | b64enc }}
