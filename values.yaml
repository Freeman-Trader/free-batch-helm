backend:
  image:
    repository: "ghcr.io/freeman-trader/free-batch-backend"
    tag: "main"
    pullPolicy: Always
  restartPolicy: Never
  pollingInterval: 5
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  maxReplicaCount: 100
  triggers:
    mode: QueueLength
    value: "1"
  runOnce: true

frontend:
  replicas: 1
  image:
    repository: "ghcr.io/freeman-trader/free-batch-frontend"
    tag: "main"
    pullPolicy: Always
  restartPolicy: Always
  containerPort: 8080
  flaskHost: "0.0.0.0"
  flaskDebug: false
  service:
    type: ClusterIP
    port: 80
    portName: http

mysql:
  containerPort: 3306
  user: "root"
  name: "jobs"
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  restartPolicy: Always
  service:
    type: ClusterIP
    port: 3306
    portName: mysql
  volume:
    storage: 1Gi
    name: mysql-data
    mountPath: /var/lib/mysql
    accessModes: ["ReadWriteOnce"]

rabbitmq:
  containerPort: 5672
  managementPort: 15672
  queue: "job-queue"
  auth:
    user: guest
    password: guest
  image:
    repository: rabbitmq
    tag: "4.3.0-management-alpine"
    pullPolicy: IfNotPresent
  restartPolicy: Always
  service:
    type: ClusterIP
    amqpPort: 5672
    managementPort: 15672
    amqpPortName: amqp
    managementPortName: management

secret:
  dbPassword: "Test123"

ingress:
  className: "nginx"
  hosts: 
    - host: "test.local"
      paths:
      - path: /
        pathType: Prefix
  